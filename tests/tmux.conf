# keep status simple so we can assert exact strings
set -g status-left 'ORIG-LEFT'

# Configure BEFORE loading the plugin
set -g @tmux_lock_toggle_key 'C-g'
set -g @tmux_lock_user_keys '0 1'

# Use canonical tmux key names so list-keys matches our assertions
set -g @tmux_lock_unbind_keys 'C-Pageup C-PPage C-S-Left'

# hide the status bar when locked
set -g @tmux_hide_status_onlock '1'

# auto-lock can parse either a plain space-separated list or a JSON-ish list
set -g @tmux_lock_auto_commands '[ "sleep", "cat" ]'
set -g @tmux_lock_auto_interval '1'

# Load your plugin
run-shell '#{E:TMUX_LOCK_TEST_ROOT}/tmux-lock.tmux'

# Add a couple of root-table -n bindings that the plugin should unbind
# Include a format to ensure resourcing preserves formats.
bind-key -T root C-Pageup display-message "PGUP #{pane_id}"
bind-key -T root C-S-Left  display-message "LEFT"
# And a User0 root bind to verify it gets removed/restored
bind-key -T root User0 display-message "USER0"
